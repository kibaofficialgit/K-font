<!DOCTYPE html>
<html>
<head>
  <title>Kiba Font Studio</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://unpkg.com/opentype.js@latest/dist/opentype.min.js"></script>
</head>
<body>

<div class="container">

  <h1>KIBA FONT STUDIO</h1>

  <!-- PROJECT PANEL -->
  <div id="projectPanel">
    <input id="projectName" placeholder="New project name">
    <button onclick="createProject()">Create</button>
    <div id="projectList"></div>
  </div>

  <!-- APP UI -->
  <div id="appUI" style="display:none;">

    <h3 id="currentProject"></h3>

    <input id="textInput" placeholder="Preview text">
    <p id="preview">Preview</p>

    <input id="charInput" maxlength="1" placeholder="Letter">
    <input type="range" id="brushSize" min="1" max="12" value="4">

    <div>
      <button onclick="undo()">Undo</button>
      <button onclick="redo()">Redo</button>
      <button onclick="clearCanvas()">Clear</button>
      <button onclick="saveGlyph()">Save</button>
    </div>

    <canvas id="canvas"></canvas>

    <div>
      <button onclick="generateFont()">Generate</button>
      <button onclick="downloadFont()">Download</button>
      <button onclick="saveProject()">Save Local</button>
      <button onclick="saveProjectOnline()">Cloud Save</button>
      <button onclick="loadProjectOnline(currentProject)">Cloud Load</button>
      <button onclick="backToProjects()">Back</button>
    </div>

  </div>

</div>

<!-- Firebase -->
<script type="module" src="firebase.js"></script>

<!-- App -->
<script src="app.js"></script>

</body>
</html>
