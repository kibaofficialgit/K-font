<!DOCTYPE html>
<html>
<head>
  <title>K-Font Creator</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://unpkg.com/opentype.js@latest/dist/opentype.min.js"></script>
</head>
<body>

<div class="container">

  <h1>🎨 K-Font Creator</h1>

  <input id="textInput" placeholder="Type preview text..." />
  <p id="preview">Preview Text</p>

  <div class="top-controls">
    <input id="charInput" maxlength="1" placeholder="Letter" />
    <input type="range" id="brushSize" min="1" max="10" value="3" />
    <button onclick="clearCanvas()">Clear</button>
    <button onclick="saveGlyph()">Save</button>
  </div>

  <canvas id="canvas"></canvas>

  <div class="bottom-controls">
    <button onclick="generateFont()">Generate Font</button>
    <button onclick="downloadFont()">Download</button>
  </div>

  <footer>
    <p>Made with ❤️ by <strong>Kiba Official</strong></p>
  </footer>

</div>

<script src="app.js"></script>
</body>
</html>
