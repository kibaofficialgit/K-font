<!DOCTYPE html>
<html>
<head>
  <title>Kiba Font Studio</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://unpkg.com/opentype.js@latest/dist/opentype.min.js"></script>
</head>
<body>

<div class="container">

  <h1 class="logo">KIBA FONT STUDIO</h1>

  <input id="textInput" placeholder="Type your text..." />
  <div class="preview-box">
    <p id="preview">Your Custom Text</p>
  </div>

  <div class="controls">
    <input id="charInput" maxlength="1" placeholder="Letter" />
    <input type="range" id="brushSize" min="1" max="12" value="4" />
    <button onclick="clearCanvas()">Clear</button>
    <button onclick="saveGlyph()">Save</button>
  </div>

  <canvas id="canvas"></canvas>

  <div class="bottom-controls">
    <button onclick="generateFont()">Generate Font</button>
    <button onclick="downloadFont()">Download</button>
  </div>

  <footer>
    <p>© 2026 <strong>Kiba Official</strong></p>
  </footer>

</div>

<script src="app.js"></script>
</body>
</html>
