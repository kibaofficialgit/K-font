<!DOCTYPE html>
<html>
<head>
  <title>Kiba Font Studio</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://unpkg.com/opentype.js@latest/dist/opentype.min.js"></script>
</head>
<body>

<!-- 3 DOT MENU -->
<div class="menu">
  <button onclick="toggleMenu()">⋮</button>
  <div id="dropdown" class="dropdown">
    <p onclick="openGuide()">Guide</p>
  </div>
</div>

<div class="container">

  <h1>KIBA FONT STUDIO</h1>

  <!-- PROJECT -->
  <div id="projectPanel">
    <input id="projectName" placeholder="Project name">
    <button onclick="createProject()">Create</button>
    <div id="projectList"></div>
  </div>

  <!-- APP -->
  <div id="appUI" style="display:none;">

    <h3 id="currentProject"></h3>

    <input id="textInput" placeholder="Type preview..." />
    <p id="preview">Preview</p>

    <input id="charInput" maxlength="1" placeholder="Letter">
    <input type="range" id="brushSize" min="1" max="12" value="4">

    <div>
      <button onclick="undo()">Undo</button>
      <button onclick="redo()">Redo</button>
      <button onclick="clearCanvas()">Clear</button>
      <button onclick="saveGlyph()">Save</button>
    </div>

    <canvas id="canvas"></canvas>

    <div>
      <button onclick="generateFont()">Generate</button>
      <button onclick="downloadFont()">Download</button>
      <button onclick="saveProjectOnline()">Cloud Save</button>
      <button onclick="loadProjectOnline(currentProject)">Cloud Load</button>
      <button onclick="backToProjects()">Back</button>
    </div>

  </div>

</div>

<!-- GUIDE MODAL -->
<div id="guideModal" class="modal">
  <div class="modal-content">
    <h2>Guide</h2>
    <p>1. Create project</p>
    <p>2. Enter letter</p>
    <p>3. Draw on canvas</p>
    <p>4. Click Save</p>
    <p>5. Generate font</p>
    <p>6. Download</p>
    <button onclick="closeGuide()">Close</button>
  </div>
</div>

<script type="module" src="firebase.js"></script>
<script src="app.js"></script>

</body>
</html>
